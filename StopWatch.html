<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MY Stopwatch</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet"/>
</head>
<body>

  <div class="scanlines"></div>
  <div class="noise"></div>

  <main class="container">

    <header class="header">
      <div class="logo-dot"></div>
      <h1 class="title">MY TIMER</h1>
      <div class="logo-dot"></div>
    </header>

    <section class="timer-wrap">
      <div class="glow-ring"></div>
      <div class="timer-display" id="timerDisplay">
        <span class="time-segment" id="minutes">00</span>
        <span class="colon">:</span>
        <span class="time-segment" id="seconds">00</span>
        <span class="colon dim">.</span>
        <span class="time-segment ms" id="milliseconds">000</span>
      </div>
      <div class="timer-label">MIN &nbsp;&nbsp; SEC &nbsp;&nbsp;&nbsp;&nbsp;&nbsp; MS</div>
    </section>

    <section class="controls">
      <button class="btn btn-reset" id="resetBtn" title="Reset">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="M1 4v6h6M23 20v-6h-6"/>
          <path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 0 1 3.51 15"/>
        </svg>
        Reset
      </button>

      <button class="btn btn-start" id="startPauseBtn">
        <span class="btn-icon" id="btnIcon">▶</span>
        <span id="btnLabel">START</span>
      </button>

      <button class="btn btn-lap" id="lapBtn" disabled title="Lap">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <circle cx="12" cy="12" r="10"/>
          <polyline points="12 6 12 12 16 14"/>
        </svg>
        Lap
      </button>
    </section>

    <section class="laps-section" id="lapsSection">
      <div class="laps-header" id="lapsHeader" style="display:none">
        <span>LAP</span>
        <span>LAP TIME</span>
        <span>TOTAL</span>
      </div>
      <ul class="laps-list" id="lapsList"></ul>
    </section>

  </main>

  <script src="script.js"></script>
</body>
</html>
